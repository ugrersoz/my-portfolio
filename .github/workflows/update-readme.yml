name: Update README with Last Commit and Version

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  update-readme:
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Get Last Commit Date
        run: |
          LAST_COMMIT_DATE=$(git log -1 --format="%cd" --date=short)
          echo "LAST_COMMIT_DATE=$LAST_COMMIT_DATE" >> $GITHUB_ENV
      - name: Get Latest Tag
        run: |
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v1.0.0")
          echo "LATEST_TAG=$LATEST_TAG" >> $GITHUB_ENV
      - name: Update README
        run: |
          sed -i "s|^\*\*Last updated\*\*:.*|**Last updated**: ${LAST_COMMIT_DATE}|" README.md
          sed -i "s|^\*\*Version\*\*:.*|**Version**: ${LATEST_TAG}|" README.md
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update README with latest commit date and version [skip ci]"
          branch: main
          skip_dirty_check: false
