name: Bug report
description: Something on the site is broken or behaving unexpectedly.
title: "[bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear and concise description of the issue.
      placeholder: When I click X on mobile, Y happens instead of Z.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true
  - type: input
    id: browser
    attributes:
      label: Browser / device
      placeholder: e.g. Safari 18 on iPhone 15, Chrome 140 on Windows 11
    validations:
      required: true
  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots / console errors (optional)
